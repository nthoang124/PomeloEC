version: "3.8"
services:
  # 1. Cơ sở dữ liệu chính (Postgres) - Giả lập cho Supabase Local.
  postgres:
    image: postgres:15-alpine
    container_name: pomeloec_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pomeloec
    # Bắt buộc bật WAL level logical để Debezium có thể bám vào đọc Log (CDC)
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Redis - In-Memory Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: pomeloec_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

  # 3. Message Broker (Kafka chuẩn KRaft mới, không cần Zookeeper)
  kafka:
    image: bitnami/kafka:latest
    container_name: pomeloec_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
    volumes:
      - kafka_data:/bitnami/kafka
    restart: always

  # 4. Identity & Access Management (SSO OIDC Server)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: pomeloec_keycloak
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    depends_on:
      - postgres
    restart: always

  # 5. Change Data Capture (CDC Connector)
  debezium:
    image: quay.io/debezium/connect:2.5
    container_name: pomeloec_debezium
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
    depends_on:
      - kafka
      - postgres
    restart: always

  # 6. Analytics Database (OLAP)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: pomeloec_clickhouse
    ports:
      - "8123:8123" # HTTP Port
      - "9000:9000" # Native Client Port
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: always

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  clickhouse_data:
