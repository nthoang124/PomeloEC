<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tìm kiếm sản phẩm - PomeloEC (Aurora Layout)</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        padding: 5vh 0;
      }

      .search-layout {
        grid-template-columns: 280px 1fr !important;
      }

      .filter-group {
        margin-bottom: var(--sp-5);
      }

      .filter-group-title {
        font-weight: 700;
        margin-bottom: var(--sp-3);
        padding-bottom: 8px;
        border-bottom: 1px dashed rgba(0, 0, 0, 0.1);
      }

      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        color: var(--color-text-muted);
        transition: color var(--transition-fast);
        font-size: 0.9rem;
      }
      .checkbox-label:hover {
        color: var(--color-text-main);
      }
      .checkbox-label input[type="checkbox"] {
        accent-color: var(--color-matcha);
        transform: scale(1.1);
      }

      .search-input-large {
        width: 100%;
        padding: 16px 24px;
        font-size: 1.1rem;
        border: 1px solid rgba(255, 255, 255, 0.7);
        background: var(--card-white-glass-intense);
        border-radius: var(--radius-full);
        outline: none;
        transition: all var(--transition-fast);
        box-shadow: var(--shadow-glass);
        backdrop-filter: blur(20px);
      }
      .search-input-large:focus {
        background: white;
      }

      .sort-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--sp-5);
        background: var(--card-white-glass);
        backdrop-filter: blur(10px);
        padding: var(--sp-3) var(--sp-4);
        border-radius: var(--radius-md);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="app-window">
      <!-- Header -->
      <header class="app-nav">
        <a
          href="home.html"
          style="
            font-weight: 800;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #374151;
          "
        >
          <span
            style="
              font-size: 1.8rem;
              filter: hue-rotate(120deg) brightness(1.2);
            "
            >🍉</span
          >
          PomeloEC
        </a>

        <nav class="nav-links">
          <a href="home.html">Home</a>
          <a href="search.html" class="active">Shop</a>
          <a href="seasonal.html">Seasonal</a>
          <a href="recipes.html">Recipes</a>
          <a href="account.html">Account</a>
        </nav>
      </header>

      <main class="app-content search-layout">
        <!-- Left Sidebar (Filters) -->
        <aside
          class="glass-box"
          style="height: fit-content; align-self: flex-start"
        >
          <div class="filter-group">
            <div class="filter-group-title">🏷️ Danh mục</div>
            <label class="checkbox-label"
              ><input type="checkbox" checked /> Trái cây tươi (124)</label
            >
            <label class="checkbox-label"
              ><input type="checkbox" /> Rau củ sạch (89)</label
            >
            <label class="checkbox-label"
              ><input type="checkbox" /> Thực phẩm khô (45)</label
            >
          </div>

          <div class="filter-group">
            <div class="filter-group-title">📍 Khu vực Giao</div>
            <label class="checkbox-label"
              ><input type="checkbox" checked /> TP. Hồ Chí Minh</label
            >
            <label class="checkbox-label"
              ><input type="checkbox" /> Hà Nội</label
            >
            <label class="checkbox-label"
              ><input type="checkbox" /> Đà Lạt</label
            >
          </div>

          <div class="filter-group">
            <div class="filter-group-title">⭐ Đánh giá</div>
            <label class="checkbox-label"
              ><input type="checkbox" /> Từ 4 Sao trở lên</label
            >
            <label class="checkbox-label"
              ><input type="checkbox" /> Từ 5 Sao</label
            >
          </div>

          <button class="btn-glass" style="margin-top: var(--sp-4)">
            Lọc kết quả
          </button>
        </aside>

        <!-- Right Main Content -->
        <div>
          <div style="margin-bottom: var(--sp-4)">
            <input
              type="text"
              class="search-input-large"
              value="Dâu tây"
              placeholder="Tìm kiếm..."
            />
          </div>

          <div class="sort-bar">
            <div><span class="font-bold">12</span> kết quả cho "Dâu tây"</div>
            <select
              style="
                border: none;
                outline: none;
                background: transparent;
                font-family: inherit;
                font-weight: 600;
                color: #374151;
                cursor: pointer;
              "
            >
              <option>Bán chạy nhất</option>
              <option>Giá thấp đến cao</option>
              <option>Giá cao đến thấp</option>
            </select>
          </div>

          <!-- Product Grid -->
          <section
            style="
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
              gap: var(--sp-5);
            "
          >
            <!-- Item 1 -->
            <a href="pdp.html" class="aurora-card pink">
              <div class="card-img-wrapper" style="font-size: 3rem">🍓</div>
              <div>
                <div class="text-xs text-muted" style="font-weight: 600">
                  Hữu cơ VietGAP
                </div>
                <h3 style="margin-bottom: 8px">
                  Dâu tây Mộc Châu túi 500g loại 1
                </h3>
                <div
                  style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 12px;
                  "
                >
                  <span class="font-bold" style="font-size: 1.1rem"
                    >125.000₫</span
                  >
                </div>
                <button
                  class="btn-glass"
                  style="background: var(--card-pink-btn)"
                >
                  Thêm Giỏ Hàng
                </button>
              </div>
            </a>

            <!-- Item 2 -->
            <a href="pdp.html" class="aurora-card pink">
              <div class="card-img-wrapper" style="font-size: 3rem">🍓</div>
              <div>
                <div class="text-xs text-muted" style="font-weight: 600">
                  Sấy khô
                </div>
                <h3 style="margin-bottom: 8px">Dâu tây Đà Lạt sấy dẻo 200g</h3>
                <div
                  style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 12px;
                  "
                >
                  <span class="font-bold" style="font-size: 1.1rem"
                    >65.000₫</span
                  >
                </div>
                <button
                  class="btn-glass"
                  style="background: var(--card-pink-btn)"
                >
                  Thêm Giỏ Hàng
                </button>
              </div>
            </a>

            <!-- Item 3 -->
            <a href="pdp.html" class="aurora-card pink">
              <div class="card-img-wrapper" style="font-size: 3rem">🥛🍓</div>
              <div>
                <div class="text-xs text-muted" style="font-weight: 600">
                  Đồ Uống
                </div>
                <h3 style="margin-bottom: 8px">Sữa chua vị Dâu tây hộp 4 hũ</h3>
                <div
                  style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 12px;
                  "
                >
                  <span class="font-bold" style="font-size: 1.1rem"
                    >32.000₫</span
                  >
                </div>
                <button
                  class="btn-glass"
                  style="background: var(--card-pink-btn)"
                >
                  Thêm Giỏ Hàng
                </button>
              </div>
            </a>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
