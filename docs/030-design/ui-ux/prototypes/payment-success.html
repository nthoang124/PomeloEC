<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt hàng Thành công! - PomeloEC</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        padding: 0;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .success-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #10b981, #059669);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
        margin: 0 auto var(--sp-6) auto;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes popIn {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .auth-container {
        width: 100%;
        max-width: 500px;
        padding: var(--sp-8);
        z-index: 10;
        text-align: center;
      }

      .ticket-info {
        background: rgba(255, 255, 255, 0.4);
        border: 1px dashed rgba(0, 0, 0, 0.1);
        padding: var(--sp-4);
        border-radius: var(--radius-md);
        margin: var(--sp-6) 0;
        text-align: left;
      }
      .t-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 0.9rem;
      }
      .t-row:last-child {
        margin-bottom: 0;
        border-top: 1px dashed rgba(0, 0, 0, 0.1);
        padding-top: 8px;
        margin-top: 8px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="glass-box" style="padding: var(--sp-8)">
        <div class="success-icon">✓</div>
        <h2 style="margin-bottom: var(--sp-2); color: #059669">
          Đặt hàng Thành công!
        </h2>
        <p class="text-muted" style="font-weight: 600">
          Cảm ơn bạn đã tin tưởng mua sắm tại PomeloEC.<br />Đơn hàng sẽ được
          giao trong vòng 2H.
        </p>

        <div class="ticket-info">
          <div class="t-row">
            <span class="text-muted">Mã đơn hàng:</span>
            <span class="font-bold">#ORD_7789A</span>
          </div>
          <div class="t-row">
            <span class="text-muted">Phương thức TT:</span>
            <span class="font-bold">VNPay</span>
          </div>
          <div class="t-row">
            <span class="text-muted">Tổng thanh toán:</span>
            <span class="font-bold" style="color: #f43f5e">170.000₫</span>
          </div>
          <div class="t-row">
            <span class="text-muted">Tích lũy điểm (Hạng Bạc):</span>
            <span class="font-bold" style="color: #10b981">+ 170 Pomelos</span>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: var(--sp-3)">
          <button
            class="btn-glass"
            style="background: rgba(16, 185, 129, 0.8); color: white"
            onclick="window.location.href = 'buyer-orders.html'"
          >
            Theo Dõi Đơn Hàng (\`UC-08\`)
          </button>
          <button
            class="btn-glass"
            onclick="window.location.href = 'search.html'"
          >
            Tiếp tục Mua sắm
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
